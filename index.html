<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>joan.lab — Prototype Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0A0A0B;
      --surface: rgba(255,255,255,0.02);
      --surface-hover: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.06);
      --border-hover: rgba(255,255,255,0.12);
      --text-primary: #fff;
      --text-secondary: #999;
      --text-muted: #555;
      --text-ghost: #333;
      --mono: 'JetBrains Mono', 'Fira Code', monospace;
      --heading: 'Space Mono', monospace;
      --body: 'Inter', -apple-system, system-ui, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: var(--body);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.14); }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.35; }
      50%      { opacity: 1; }
    }
    @keyframes grain {
      0%, 100% { transform: translate(0,0); }
      10% { transform: translate(-2%,-3%); }
      30% { transform: translate(3%,2%); }
      50% { transform: translate(-1%,4%); }
      70% { transform: translate(2%,-2%); }
      90% { transform: translate(-3%,1%); }
    }

    /* Grain overlay */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      animation: grain 6s steps(10) infinite;
      opacity: 0.5;
    }

    /* Layout */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 40px;
    }

    @media (max-width: 640px) {
      .container { padding: 0 20px; }
    }

    /* Header */
    .header {
      padding-top: 48px;
      margin-bottom: 36px;
    }

    .header__beacon {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .header__dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #5AE8B5;
      animation: pulse 2.5s ease-in-out infinite;
      box-shadow: 0 0 10px #5AE8B533;
    }

    .header__label {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .header__title {
      font-family: var(--heading);
      font-size: clamp(32px, 5vw, 44px);
      font-weight: 700;
      letter-spacing: -0.04em;
      background: linear-gradient(135deg, #fff 20%, #555 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
      margin-bottom: 6px;
    }

    .header__meta {
      font-size: 13px;
      color: var(--text-muted);
      font-family: var(--mono);
    }

    /* Controls */
    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      padding-bottom: 28px;
      margin-bottom: 36px;
      border-bottom: 1px solid var(--border);
    }

    .search {
      position: relative;
      flex: 1 1 200px;
      max-width: 300px;
    }

    .search__icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #444;
      font-size: 14px;
      pointer-events: none;
    }

    .search__input {
      width: 100%;
      padding: 10px 14px 10px 34px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      color: #fff;
      font-size: 13px;
      font-family: var(--body);
      transition: border-color 0.2s;
    }

    .search__input::placeholder { color: #3a3a3a; }
    .search__input:focus { outline: none; border-color: rgba(255,255,255,0.18); }

    .filters {
      display: flex;
      gap: 3px;
      background: rgba(255,255,255,0.02);
      border-radius: 8px;
      padding: 3px;
    }

    .filter-btn {
      padding: 7px 14px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 500;
      font-family: var(--body);
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn:hover { color: var(--text-secondary); }
    .filter-btn.active { background: rgba(255,255,255,0.1); color: #fff; }

    /* Project sections */
    .project {
      margin-bottom: 44px;
      animation: fadeUp 0.45s ease both;
    }

    .project__header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      cursor: pointer;
      user-select: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
    }

    .project__header.open {
      border-bottom-color: var(--border);
      margin-bottom: 16px;
    }

    .project__swatch {
      width: 10px; height: 10px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .project__name {
      font-family: var(--heading);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.02em;
      flex: 1;
    }

    .project__count {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-muted);
    }

    .project__chevron {
      color: var(--text-muted);
      font-size: 16px;
      transition: transform 0.25s;
    }

    .project__chevron.collapsed { transform: rotate(-90deg); }

    .project__desc {
      color: #555;
      font-size: 13px;
      font-style: italic;
      margin: 0 0 18px 22px;
    }

    /* Prototype grid */
    .proto-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 12px;
      padding-left: 22px;
    }

    @media (max-width: 640px) {
      .proto-grid {
        grid-template-columns: 1fr;
        padding-left: 0;
      }
    }

    /* Prototype card */
    .proto-card {
      position: relative;
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 20px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.25s ease;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .proto-card:hover {
      background: var(--surface-hover);
      border-color: var(--border-hover);
      transform: translateY(-2px);
    }

    .proto-card__accent {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      opacity: 0.35;
      transition: opacity 0.3s;
    }

    .proto-card:hover .proto-card__accent { opacity: 1; }

    .proto-card__top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
    }

    .proto-card__name {
      font-family: var(--heading);
      font-size: 15px;
      font-weight: 600;
      color: #fff;
    }

    .proto-card__version {
      font-family: var(--mono);
      font-size: 12px;
      margin-left: 8px;
      opacity: 0.7;
    }

    .proto-card__desc {
      color: var(--text-secondary);
      font-size: 13px;
      line-height: 1.55;
      margin-bottom: 14px;
    }

    .proto-card__bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .proto-card__tags {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }

    .tag {
      padding: 2px 8px;
      border-radius: 4px;
      background: rgba(255,255,255,0.05);
      color: #777;
      font-size: 11px;
      font-family: var(--mono);
    }

    .proto-card__date {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .proto-card__arrow {
      position: absolute;
      bottom: 18px; right: 18px;
      opacity: 0;
      transition: opacity 0.2s;
      font-size: 16px;
    }

    .proto-card:hover .proto-card__arrow { opacity: 1; }

    /* Status badge */
    .status {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .status__dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status--active  { background: rgba(90,232,181,0.12); color: #5AE8B5; }
    .status--active .status__dot { background: #5AE8B5; }

    .status--wip     { background: rgba(232,255,90,0.12); color: #E8FF5A; }
    .status--wip .status__dot { background: #E8FF5A; }

    .status--concept  { background: rgba(176,90,232,0.12); color: #B05AE8; }
    .status--concept .status__dot { background: #B05AE8; }

    .status--archived { background: rgba(255,255,255,0.04); color: #666; }
    .status--archived .status__dot { background: #555; }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 70px 0;
      color: #444;
    }
    .empty__icon { font-size: 48px; margin-bottom: 12px; }
    .empty__text { font-family: var(--mono); font-size: 14px; }

    /* Footer */
    .footer {
      margin-top: 48px;
      padding: 20px 0 40px;
      border-top: 1px solid rgba(255,255,255,0.03);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer span {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-ghost);
    }

    /* Loading state */
    .loading {
      display: flex;
      justify-content: center;
      padding: 100px 0;
    }

    .loading__spinner {
      width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,0.08);
      border-top-color: #5AE8B5;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="header__beacon">
        <div class="header__dot"></div>
        <span class="header__label">Prototype Lab</span>
      </div>
      <h1 class="header__title">joan.lab</h1>
      <p class="header__meta" id="headerMeta">Loading...</p>
    </header>

    <!-- Controls -->
    <div class="controls">
      <div class="search">
        <span class="search__icon">⌕</span>
        <input class="search__input" type="text" id="searchInput" placeholder="Search prototypes...">
      </div>
      <div class="filters" id="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="active">Active</button>
        <button class="filter-btn" data-filter="wip">WIP</button>
        <button class="filter-btn" data-filter="concept">Concept</button>
        <button class="filter-btn" data-filter="archived">Archived</button>
      </div>
    </div>

    <!-- Content -->
    <main id="content">
      <div class="loading"><div class="loading__spinner"></div></div>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <span>joan.lab — prototype management</span>
      <span>manifest.json driven</span>
    </footer>
  </div>

  <script>
    const STATUS_LABELS = {
      active: 'Active',
      wip: 'WIP',
      concept: 'Concept',
      archived: 'Archived'
    };

    let manifest = null;
    let currentFilter = 'all';
    let currentSearch = '';
    let expandedProjects = {};

    // ── Fetch manifest ──────────────────────────────────
    async function loadManifest() {
      try {
        const res = await fetch('manifest.json');
        manifest = await res.json();
        // All expanded by default
        manifest.projects.forEach(p => { expandedProjects[p.id] = true; });
        updateMeta();
        render();
      } catch (err) {
        document.getElementById('content').innerHTML = `
          <div class="empty">
            <div class="empty__icon">⚠</div>
            <div class="empty__text">Could not load manifest.json</div>
          </div>`;
      }
    }

    // ── Update header meta ──────────────────────────────
    function updateMeta() {
      const totalProtos = manifest.projects.reduce((a, p) => a + p.prototypes.length, 0);
      document.getElementById('headerMeta').textContent =
        `${manifest.projects.length} projects · ${totalProtos} prototypes · experimentation workspace`;
    }

    // ── Filter + Search logic ───────────────────────────
    function getFilteredProjects() {
      const q = currentSearch.toLowerCase();
      return manifest.projects
        .map(proj => ({
          ...proj,
          prototypes: proj.prototypes.filter(proto => {
            const matchFilter = currentFilter === 'all' || proto.status === currentFilter;
            const matchSearch = !q
              || proto.name.toLowerCase().includes(q)
              || proto.description.toLowerCase().includes(q)
              || proto.tags.some(t => t.includes(q))
              || proj.name.toLowerCase().includes(q);
            return matchFilter && matchSearch;
          })
        }))
        .filter(proj => proj.prototypes.length > 0);
    }

    // ── Render ──────────────────────────────────────────
    function render() {
      const projects = getFilteredProjects();
      const content = document.getElementById('content');

      if (projects.length === 0) {
        content.innerHTML = `
          <div class="empty">
            <div class="empty__icon">∅</div>
            <div class="empty__text">No prototypes match your filter</div>
          </div>`;
        return;
      }

      content.innerHTML = projects.map((proj, pi) => {
        const isOpen = expandedProjects[proj.id];
        return `
          <section class="project" style="animation-delay: ${pi * 0.06}s">
            <div class="project__header ${isOpen ? 'open' : ''}" data-project="${proj.id}">
              <div class="project__swatch" style="background:${proj.color}; box-shadow: 0 0 12px ${proj.color}33"></div>
              <h2 class="project__name">${proj.name}</h2>
              <span class="project__count">${proj.prototypes.length} proto${proj.prototypes.length !== 1 ? 's' : ''}</span>
              <span class="project__chevron ${isOpen ? '' : 'collapsed'}">▾</span>
            </div>
            ${isOpen ? `
              <p class="project__desc">${proj.description}</p>
              <div class="proto-grid">
                ${proj.prototypes.map((proto, i) => protoCard(proto, proj.color, i)).join('')}
              </div>
            ` : ''}
          </section>`;
      }).join('');

      // Attach toggle listeners
      content.querySelectorAll('.project__header').forEach(el => {
        el.addEventListener('click', () => {
          const id = el.dataset.project;
          expandedProjects[id] = !expandedProjects[id];
          render();
        });
      });
    }

    function protoCard(proto, color, index) {
      const hasPath = proto.path && proto.path !== '#';
      const tag = hasPath ? 'a' : 'div';
      const href = hasPath ? `href="${proto.path}" target="_blank"` : '';

      return `
        <${tag} class="proto-card" ${href} style="animation: fadeUp 0.4s ease ${index * 0.06}s both">
          <div class="proto-card__accent" style="background: linear-gradient(90deg, ${color}, transparent)"></div>
          <div class="proto-card__top">
            <div>
              <span class="proto-card__name">${proto.name}</span>
              <span class="proto-card__version" style="color:${color}">${proto.version}</span>
            </div>
            <span class="status status--${proto.status}">
              <span class="status__dot"></span>
              ${STATUS_LABELS[proto.status] || proto.status}
            </span>
          </div>
          <p class="proto-card__desc">${proto.description}</p>
          <div class="proto-card__bottom">
            <div class="proto-card__tags">
              ${proto.tags.map(t => `<span class="tag">${t}</span>`).join('')}
            </div>
            <span class="proto-card__date">${proto.date}</span>
          </div>
          <span class="proto-card__arrow" style="color:${color}">↗</span>
        </${tag}>`;
    }

    // ── Event listeners ─────────────────────────────────
    document.getElementById('searchInput').addEventListener('input', e => {
      currentSearch = e.target.value;
      render();
    });

    document.getElementById('filters').addEventListener('click', e => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      render();
    });

    // ── Init ────────────────────────────────────────────
    loadManifest();
  </script>
</body>
</html>
